<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - COUSERIASEMOR</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo-brand">
                <span class="logo-icon">🎉</span>
                <span class="logo-text">COUSERIASEMOR</span>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">← Back</a></li>
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li id="authLinks">
                    <a href="login.html" class="nav-link">Login</a>
                    <a href="register.html" class="nav-link">Register</a>
                </li>
            </ul>
        </div>
    </nav>
    <div class="container">
        <div class="registration-box">
            <div class="logo">
                <h1>COUSERIASEMOR</h1>
                <p>Login to Your Account</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required placeholder="john@example.com">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="••••••••">
                </div>

                <button type="submit" class="btn-register">Login</button>

                <div id="message" class="message"></div>
            </form>

            <div class="login-link">
                Don't have an account? <a href="register.html">Register here</a>
            </div>
        </div>
    </div>

    <script src="login-script.js"></script>
    <script src="auto-refresh.js"></script>
    <script>
        const authLinks = document.getElementById('authLinks');
        const token = localStorage.getItem('authToken');
        const welcomeName = localStorage.getItem('welcomeName');

        if (token && welcomeName) {
            authLinks.innerHTML = `<a href="#" class="nav-link logout-link">Logout</a> <span class="nav-link">${welcomeName}</span>`;
        }
    </script>
</body>
</html>
